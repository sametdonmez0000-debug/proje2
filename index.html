<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Pixelland</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      background: #1f2937;
    }

    header h1 {
      margin: 0;
    }

    .panel {
      width: 90%;
      max-width: 600px;
      margin: 20px auto;
      padding: 15px;
      background: #1f2937;
      border-radius: 12px;
    }

    input[type="color"] {
      width: 90px;
      height: 50px;
      border: none;
      cursor: pointer;
    }

    #status {
      margin-top: 12px;
      color: #facc15;
      font-size: 14px;
    }

    .grid-container {
      width: 100%;
      overflow: auto;
      padding-bottom: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(30, 18px);
      gap: 2px;
      width: max-content;
      margin: 20px auto;
    }

    .pixel {
      width: 18px;
      height: 18px;
      background: white;
      border: 1px solid #9ca3af;
      cursor: pointer;
    }

    .pixel:hover {
      border-color: yellow;
      transform: scale(1.15);
    }

    .chat-box {
      width: 90%;
      max-width: 600px;
      margin: 20px auto;
      background: #1f2937;
      border-radius: 12px;
      overflow: hidden;
    }

    .chat-title {
      padding: 12px;
      border-bottom: 1px solid #374151;
      font-weight: bold;
    }

    #messages {
      height: 230px;
      overflow-y: auto;
      padding: 12px;
      text-align: left;
    }

    .message {
      padding: 8px;
      margin-bottom: 7px;
      background: #111827;
      border-radius: 8px;
      overflow-wrap: anywhere;
    }

    .message-user {
      color: #c4b5fd;
      font-size: 12px;
      font-weight: bold;
    }

    .message-text {
      margin-top: 4px;
      font-size: 14px;
    }

    .chat-form {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid #374151;
    }

    #messageInput {
      flex: 1;
      min-width: 0;
      padding: 11px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    #sendButton {
      padding: 11px 15px;
      border: none;
      border-radius: 8px;
      background: #8b5cf6;
      color: white;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      .grid {
        grid-template-columns: repeat(30, 10px);
      }

      .pixel {
        width: 10px;
        height: 10px;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>🎨 Pixelland</h1>
    <p>Rengini seç, piksele dokun ve izini bırak.</p>
  </header>

  <div class="panel">
    <label for="colorPicker">Renk seç:</label>

    <br><br>

    <input
      type="color"
      id="colorPicker"
      value="#ff0000"
    >

    <div id="status">
      Piksel alanı hazırlanıyor...
    </div>
  </div>

  <div class="grid-container">
    <div id="pixelGrid" class="grid"></div>
  </div>

  <div class="chat-box">
    <div class="chat-title">
      💬 Anonim Sohbet
    </div>

    <div id="messages">
      <div class="message">
        <div class="message-user">Pixelland Bot</div>
        <div class="message-text">
          Hoş geldin! İlk mesajı sen yazabilirsin.
        </div>
      </div>
    </div>

    <form id="chatForm" class="chat-form">
      <input
        id="messageInput"
        type="text"
        maxlength="180"
        autocomplete="off"
        placeholder="Anonim mesaj yaz..."
      >

      <button id="sendButton" type="submit">
        Gönder
      </button>
    </form>
  </div>

  <script>
    const grid = document.getElementById("pixelGrid");
    const colorPicker = document.getElementById("colorPicker");
    const statusText = document.getElementById("status");

    const gridSize = 30;
    const totalPixels = gridSize * gridSize;

    window.savePixelToFirebase = null;

    for (let i = 0; i < totalPixels; i++) {
      const pixel = document.createElement("div");

      pixel.className = "pixel";
      pixel.dataset.id = i;

      pixel.addEventListener("click", function () {
        const selectedColor = colorPicker.value;

        pixel.style.backgroundColor = selectedColor;

        if (window.savePixelToFirebase) {
          window.savePixelToFirebase(i, selectedColor);
        } else {
          statusText.innerText =
            "Piksel boyandı fakat Firebase henüz bağlanmadı.";
        }
      });

      grid.appendChild(pixel);
    }
  </script>

  <script type="module">
    import {
      initializeApp
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

    import {
      getDatabase,
      ref,
      set,
      push,
      onValue,
      query,
      limitToLast,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBOQeWgxafFQVjUbfSw10MWccttXu9TFLY",

      authDomain: "pixel-99f00.firebaseapp.com",

      databaseURL: "BURAYA_DATABASE_ANA_ADRESINI_YAZ",

      projectId: "pixel-99f00",

      storageBucket: "pixel-99f00.firebasestorage.app",

      messagingSenderId: "894234692943",

      appId: "1:894234692943:web:c74c9ad3eb6c7ed252c93a",

      measurementId: "G-CQ9K97ZT7C"
    };

    const statusText = document.getElementById("status");
    const messagesBox = document.getElementById("messages");
    const chatForm = document.getElementById("chatForm");
    const messageInput = document.getElementById("messageInput");

    let lastMessageTime = 0;

    let anonymousName =
      localStorage.getItem("pixellandName");

    if (!anonymousName) {
      anonymousName =
        "Pixel#" +
        Math.floor(1000 + Math.random() * 9000);

      localStorage.setItem(
        "pixellandName",
        anonymousName
      );
    }

    try {
      const app = initializeApp(firebaseConfig);
      const db = getDatabase(app);

      statusText.innerText =
        "Firebase bağlandı. Piksel boyayabilirsin.";

      window.savePixelToFirebase =
        async function (id, color) {
          try {
            await set(
              ref(db, "pixels/" + id),
              color
            );

            statusText.innerText =
              "Piksel kaydedildi.";
          } catch (error) {
            statusText.innerText =
              "Piksel yazma hatası: " +
              error.message;
          }
        };

      onValue(
        ref(db, "pixels"),
        function (snapshot) {
          const data = snapshot.val();

          if (!data) return;

          Object.keys(data).forEach(
            function (id) {
              const pixel =
                document.querySelector(
                  '[data-id="' + id + '"]'
                );

              if (pixel) {
                pixel.style.backgroundColor =
                  data[id];
              }
            }
          );
        }
      );

      const chatQuery = query(
        ref(db, "chat"),
        limitToLast(50)
      );

      onValue(
        chatQuery,
        function (snapshot) {
          messagesBox.innerHTML = "";

          snapshot.forEach(
            function (messageSnapshot) {
              const messageData =
                messageSnapshot.val();

              const messageElement =
                document.createElement("div");

              messageElement.className =
                "message";

              const userElement =
                document.createElement("div");

              userElement.className =
                "message-user";

              userElement.textContent =
                messageData.user || "Anonim";

              const textElement =
                document.createElement("div");

              textElement.className =
                "message-text";

              textElement.textContent =
                messageData.text || "";

              messageElement.appendChild(
                userElement
              );

              messageElement.appendChild(
                textElement
              );

              messagesBox.appendChild(
                messageElement
              );
            }
          );

          messagesBox.scrollTop =
            messagesBox.scrollHeight;
        }
      );

      chatForm.addEventListener(
        "submit",
        async function (event) {
          event.preventDefault();

          const text =
            messageInput.value.trim();

          const now = Date.now();

          if (!text) return;

          if (now - lastMessageTime < 3000) {
            alert(
              "Yeni mesaj göndermek için 3 saniye bekle."
            );

            return;
          }

          lastMessageTime = now;

          try {
            await push(
              ref(db, "chat"),
              {
                user: anonymousName,
                text: text,
                createdAt: serverTimestamp()
              }
            );

            messageInput.value = "";
          } catch (error) {
            alert(
              "Mesaj gönderilemedi: " +
              error.message
            );
          }
        }
      );
    } catch (error) {
      statusText.innerText =
        "Firebase bağlantı hatası: " +
        error.message;
    }
  </script>

</body>
</html>
